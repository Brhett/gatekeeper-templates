apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snosecretinenvvars
  annotations:
    description: >-
      STIG V-242415 CNTR-K8-001160 HIGH: Secrets in Kubernetes must not be
      stored as environment variables. Pods must not use secretKeyRef in env
      vars; secrets must be mounted as files or retrieved from an external
      secret store.
spec:
  crd:
    spec:
      names:
        kind: K8sNoSecretInEnvVars
      validation:
        openAPIV3Schema:
          type: object
          properties:
            excludedContainers:
              type: array
              items:
                type: string
              description: >-
                List of container names to exempt from this check.
            excludedImages:
              type: array
              items:
                type: string
              description: >-
                List of container image prefixes to exempt (e.g.
                "mcr.microsoft.com/azuremonitor/").
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snostigenvsecretkeyref

        import future.keywords.contains
        import future.keywords.if
        import future.keywords.in

        # Collect all containers (regular + init + ephemeral)
        all_containers contains c if {
          c := input.review.object.spec.containers[_]
        }

        all_containers contains c if {
          c := input.review.object.spec.initContainers[_]
        }

        all_containers contains c if {
          c := input.review.object.spec.ephemeralContainers[_]
        }

        is_excluded_container(name) if {
          name in input.parameters.excludedContainers
        }

        is_excluded_image(image) if {
          prefix := input.parameters.excludedImages[_]
          startswith(image, prefix)
        }

        violation contains {"msg": msg} if {
          container := all_containers[_]
          not is_excluded_container(container.name)
          not is_excluded_image(container.image)
          env := container.env[_]
          env.valueFrom.secretKeyRef
          msg := sprintf(
            "container '%v' sets env var '%v' from secretKeyRef. Secrets must be mounted as files, not injected as environment variables (STIG V-242415 / CNTR-K8-001160).",
            [container.name, env.name],
          )
        }

        violation contains {"msg": msg} if {
          container := all_containers[_]
          not is_excluded_container(container.name)
          not is_excluded_image(container.image)
          envFrom := container.envFrom[_]
          envFrom.secretRef
          msg := sprintf(
            "container '%v' mounts all keys from secret '%v' as environment variables via envFrom.secretRef. Secrets must be mounted as files, not injected as environment variables (STIG V-242415 / CNTR-K8-001160).",
            [container.name, envFrom.secretRef.name],
          )
        }
