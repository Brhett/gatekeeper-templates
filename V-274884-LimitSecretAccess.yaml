apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snooverbroadsecretaccess
  annotations:
    description: >-
      STIG V-274884 CNTR-K8-001163 MEDIUM: Kubernetes must limit Secret access
      on a need-to-know basis. Flags ClusterRoleBindings and RoleBindings that
      grant get/list/watch on secrets to overly broad subjects
      (system:authenticated, system:unauthenticated, or system:masters).
spec:
  crd:
    spec:
      names:
        kind: K8sNoOverBroadSecretAccess
      validation:
        openAPIV3Schema:
          type: object
          properties:
            forbiddenSubjects:
              type: array
              items:
                type: string
              description: >-
                Subject names that must not be granted secret read access.
                Defaults cover system:authenticated, system:unauthenticated,
                and system:masters.
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snooverbroadsecretaccess

        import future.keywords.contains
        import future.keywords.if
        import future.keywords.in

        default forbidden_subjects = ["system:authenticated", "system:unauthenticated", "system:masters"]

        # Collect subjects from the binding
        binding_subjects contains s if {
          s := input.review.object.subjects[_].name
        }

        # Check if the referenced role grants secret read access
        role_grants_secret_read if {
          # For RoleBinding/ClusterRoleBinding we can only inspect the roleRef name;
          # the actual Role rules are evaluated at admission of the Role/ClusterRole itself.
          # Flag bindings where the roleRef is a known secret-read role pattern.
          # For full coverage, pair with the ClusterRole/Role violation below.
          false # placeholder — binding-level check deferred to role admission
        }

        # Flag ClusterRoles/Roles that grant get/list/watch on secrets
        grants_secret_read if {
          rule := input.review.object.rules[_]
          resources := rule.resources[_]
          resources == "secrets"
          verb := rule.verbs[_]
          verb in {"get", "list", "watch", "*"}
        }

        violation contains {"msg": msg} if {
          input.review.kind.kind in {"ClusterRole", "Role"}
          grants_secret_read
          name := input.review.object.metadata.name
          not startswith(name, "system:")
          not name in {"cluster-admin", "admin", "edit", "view"}
          msg := sprintf(
            "%v '%v' grants get/list/watch on secrets. Verify this role has a documented organisational requirement (STIG V-274884 / CNTR-K8-001163).",
            [input.review.kind.kind, name],
          )
        }

        violation contains {"msg": msg} if {
          input.review.kind.kind in {"ClusterRoleBinding", "RoleBinding"}
          subject := input.review.object.subjects[_]
          subject.name in input.parameters.forbiddenSubjects
          msg := sprintf(
            "%v '%v' binds subject '%v' which is an overly broad group. Ensure secrets access is not granted to this subject (STIG V-274884 / CNTR-K8-001163).",
            [input.review.kind.kind, input.review.object.metadata.name, subject.name],
          )
        }
